<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <div class="card-header bg-primary text-white">
          <h3 class="card-title mb-0">
            <i class="fa fa-sign-in"></i> {{ 'auth.login' | translate }}
          </h3>
        </div>
        <div class="card-body">
          <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <!-- Email -->
            <div class="form-group mb-3">
              <label for="email" class="form-label">{{ 'auth.email' | translate }}</label>
              <input
                type="email"
                class="form-control"
                id="email"
                formControlName="email"
                placeholder="{{ 'auth.emailPlaceholder' | translate }}"
                [class.is-invalid]="submitted && f['email'].errors"
              />
              <div class="invalid-feedback" *ngIf="submitted && f['email'].errors">
                <div *ngIf="f['email'].errors['required']">{{ 'auth.emailRequired' | translate }}</div>
                <div *ngIf="f['email'].errors['email']">{{ 'auth.emailInvalid' | translate }}</div>
              </div>
            </div>

            <!-- Password -->
            <div class="form-group mb-3">
              <label for="password" class="form-label">{{ 'auth.password' | translate }}</label>
              <input
                type="password"
                class="form-control"
                id="password"
                formControlName="password"
                placeholder="{{ 'auth.passwordPlaceholder' | translate }}"
                [class.is-invalid]="submitted && f['password'].errors"
              />
              <div class="invalid-feedback" *ngIf="submitted && f['password'].errors">
                <div *ngIf="f['password'].errors['required']">{{ 'auth.passwordRequired' | translate }}</div>
                <div *ngIf="f['password'].errors['minlength']">{{ 'auth.passwordMinlength' | translate }}</div>
              </div>
            </div>

            <!-- Submit Button -->
            <div class="d-grid gap-2">
              <button
                type="submit"
                class="btn btn-primary"
                [disabled]="loading"
              >
                <span *ngIf="!loading">
                  <i class="fa fa-sign-in"></i> {{ 'auth.loginButton' | translate }}
                </span>
                <span *ngIf="loading">
                  <i class="fa fa-spinner fa-spin"></i> {{ 'auth.wait' | translate }}
                </span>
              </button>
            </div>
          </form>

          <!-- Register Link -->
          <hr />
          <p class="text-center mb-0">
            {{ 'auth.loginPrompt' | translate }}
            <a routerLink="/register">{{ 'auth.registerLink' | translate }}</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
