<h1>New Vehicle</h1>
<form>
  <div class="form-group">
    <label for="make">Make</label>
    <select name="make" class="form-control" (change)="onMakeChange()" [(ngModel)]="vehicle.make">
      <option value=""></option>
      <option *ngFor="let m of makes" value="{{ m.id}}">{{m.name}}</option>
    </select>
  </div>
  <div class="form-group">
    <label for="model">Model</label>
    <select name="model" id="model" class="form-control">
      <option *ngFor="let m of models" value="{{ m.id}}">{{m.name}}</option>
    </select>
  </div>
  <p>Is this vehicle registered?</p>
  <div class="radio">
    <label for="registered"></label>
    <input name="isregistered" type="radio" id="registered" value="true" class="radio-inline"> YES
     <label for="noRegistered"></label>
    <input name="isregistered" type="radio" id="noRegistered" value="true" class="radio-inline"> NO
  </div>
  <h2>Features</h2>
  <div class="checkboxes" *ngFor="let f of features"><label for="feature{{f.id}"></label>
  <input type="checkbox" id="feature{{f.id}}"> {{f.name}}
  </div>
<h2>Contact</h2>
<div class="form-group">
  <label for="contactName">Name</label>
  <input type="text" id="contactName" class="form-control">
  <label for="contactPhone">Phone</label>
  <input type="text" id="contactPhone" class="form-control">
  <label for="contactEmail">Email</label>
  <input type="text" id="contactEmail" class="form-control">

  <button class="bn btn-primary">Save</button>

</div>
</form>
